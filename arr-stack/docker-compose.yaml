---
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: ${VPN_TYPE}
      OPENVPN_USER: ${OPENVPN_USER}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
      SERVER_REGIONS: ${SERVER_REGIONS}
    volumes:
      - ${DOCKERCONFDIR}/gluetun/config:/gluetun
    ports:
      - ${QBITTORRENT_PORT}:${QBITTORRENT_PORT}
      - ${SABNZBD_PORT}:8080
    networks:
      - skynet
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: ${QBITTORRENT_PORT}
    volumes:
      - ${DOCKERCONFDIR}/qbittorrent/config:/config
      - ${DOCKERSTORAGEDIR}/torrents:/data/torrents
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: service:gluetun
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${DOCKERCONFDIR}/sabnzbd/config:/config
      - ${DOCKERSTORAGEDIR}/usenet:/data/usenet
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: ${PUID}:${PGID}
    volumes:
      - ${FILEBROWSER_ROOT}:/srv
      - ${DOCKERCONFDIR}/filebrowser/database:/database
      - ${DOCKERCONFDIR}/filebrowser/config:/config
    ports:
      - ${FILEBROWSER_PORT}:80
    depends_on:
      gluetun:
        condition: service_healthy
    networks:
      - skynet

  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${PROWLARR_PORT}:9696
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
      DOCKER_MODS: ghcr.io/themepark-dev/theme.park:prowlarr
      TP_THEME: overseerr
    volumes:
      - ${DOCKERCONFDIR}/prowlarr/config:/config:rw
    depends_on:
      gluetun:
        condition: service_healthy
    networks:
      - skynet

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${RADARR_PORT}:7878
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
      DOCKER_MODS: ghcr.io/themepark-dev/theme.park:radarr
      TP_THEME: overseerr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/radarr/config:/config
      - ${DOCKERSTORAGEDIR}:/data
    depends_on:
      gluetun:
        condition: service_healthy
    networks:
      - skynet

  sonarr-anime:
    container_name: sonarr-anime
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${SONARR_ANIME_PORT}:8989
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
      DOCKER_MODS: ghcr.io/themepark-dev/theme.park:sonarr
      TP_THEME: overseerr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/sonarr-anime/config:/config
      - ${DOCKERSTORAGEDIR}:/data
    depends_on:
      gluetun:
        condition: service_healthy
    networks:
      - skynet

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${LIDARR_PORT}:8686
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
      DOCKER_MODS: ghcr.io/themepark-dev/theme.park:lidarr
      TP_THEME: overseerr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/lidarr/config:/config
      - ${DOCKERSTORAGEDIR}:/data
    depends_on:
      gluetun:
        condition: service_healthy
    networks:
      - skynet

networks:
  skynet:
    name: skynet
    driver: bridge
