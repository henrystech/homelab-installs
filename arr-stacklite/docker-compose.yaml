---
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: ${PUID}:${PGID}
    volumes:
      - ${FILEBROWSER_ROOT}:/srv
      - ${DOCKERCONFDIR}/filebrowser/database:/database
      - ${DOCKERCONFDIR}/filebrowser/config:/config
    ports:
      - ${FILEBROWSER_PORT}:80
    networks:
      - skynet

  prowlarr:
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:release
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${PROWLARR_PORT}:9696
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
    volumes:
      - ${DOCKERCONFDIR}/prowlarr/config:/config:rw
    networks:
      - skynet

  radarr:
    container_name: radarr
    image: ghcr.io/hotio/radarr:release
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${RADARR_PORT}:7878
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/radarr/config:/config
      - ${DOCKERSTORAGEDIR}:/data
    networks:
      - skynet

  sonarr-anime:
    container_name: sonarr-anime
    image: ghcr.io/hotio/sonarr:release
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${SONARR_ANIME_PORT}:8989
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/sonarr-anime/config:/config
      - ${DOCKERSTORAGEDIR}:/data
    networks:
      - skynet

  lidarr:
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:release
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    ports:
      - ${LIDARR_PORT}:8686
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK: "002"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/lidarr/config:/config
      - ${DOCKERSTORAGEDIR}:/data
    networks:
      - skynet

networks:
  skynet:
    name: skynet
    driver: bridge
